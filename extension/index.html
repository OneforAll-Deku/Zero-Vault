<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <style>
        body {
            width: 280px;
            padding: 1.5rem;
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f6f6f6;
            margin: 0;
        }

        .neon-box {
            background: white;
            border: 4px solid black;
            box-shadow: 6px 6px 0px 0px black;
            padding: 1.5rem;
            text-align: center;
        }

        .status-badge {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 1.5rem;
            min-height: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .btn {
            width: 100%;
            padding: 0.8rem;
            border: 3px solid black;
            font-weight: 900;
            font-size: 0.9rem;
            cursor: pointer;
            box-shadow: 4px 4px 0px 0px black;
            text-transform: uppercase;
            transition: all 0.1s;
        }

        .btn:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px 0px black;
        }

        .btn-primary {
            background: #f43f5e;
            color: white;
            margin-bottom: 10px;
        }

        .btn-secondary {
            background: #000;
            color: white;
            padding: 0.5rem;
            font-size: 0.75rem;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>

<body>
    <div class="neon-box">
        <div id="status" class="status-badge">
            <div style="font-weight: 800;">CHECKING ENGINE...</div>
        </div>

        <button id="open-dashboard" class="btn btn-primary">
            GO TO VAULT
        </button>

        <button id="lock-vault" class="btn btn-secondary hidden">
            LOCK SYSTEM
        </button>
    </div>
    <script src="popup.js"></script>
</body>

</html>
